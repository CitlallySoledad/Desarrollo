services:
  db:
    image: mysql:8.0
    container_name: punto_venta_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: db_punto_venta
      MYSQL_ROOT_PASSWORD: 12345
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p12345"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: punto_venta_backend
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: change-me-use-a-long-random-secret-key
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,backend
      DJANGO_TIME_ZONE: UTC
      DB_ENGINE: django.db.backends.mysql
      DB_NAME: db_punto_venta
      DB_USER: root
      DB_PASSWORD: 12345
      DB_HOST: db
      DB_PORT: 3306
      JWT_ACCESS_MINUTES: 60
      JWT_REFRESH_DAYS: 1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: punto_venta_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
